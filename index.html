              },

                '0%': { opacity: '0', transform: 'translateX(-10px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Special+Elite&family=Fraunces:ital,opsz,wght@0,9..144,300..800;1,9..144,300..800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-brand {
        font-family: 'Outfit', sans-serif;
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 8s linear infinite;
      }
      @media print {
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        body { background-color: white; color: black; }
      }
      /* Custom utility for view transitions */
      .view-transition {
        animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Futuristic Scrollbar Styling */
      :root {
        --scrollbar-thumb: rgba(79, 70, 229, 0.2);
        --scrollbar-thumb-hover: rgba(79, 70, 229, 0.6);
        --scrollbar-track: rgba(0, 0, 0, 0.02);
      }

      .dark {
        --scrollbar-track: rgba(255, 255, 255, 0.02);
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--scrollbar-track);
        border-radius: 10px;
        margin: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: padding-box;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      .dark ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border: 2px solid transparent;
        background-clip: padding-box;
        box-shadow: inset 0 0 4px rgba(255, 255, 255, 0.1);
      }

      .dark ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
        border: 2px solid transparent;
        background-clip: padding-box;
        box-shadow: 0 0 12px var(--scrollbar-thumb-hover);
      }

      /* Firefox Support */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
      }

      /* ==========================================
         FUTURISTIC HUD PARADIGM OVERRIDES
         ========================================== */
      .futuristic {
        --cyber-primary: rgba(var(--primary-rgb), 1);
        --cyber-glow: rgba(var(--primary-rgb), 0.25);
      }

      /* Transparent overlays isolated to remain invisible while keeping full tap area function */
      .futuristic select.opacity-0,
      .futuristic input.opacity-0,
      .futuristic textarea.opacity-0,
      .futuristic .opacity-0 select,
      .futuristic .opacity-0 input {
        opacity: 0 !important;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        appearance: none !important;
        -webkit-appearance: none !important;
        position: absolute !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        z-index: 30 !important;
        cursor: pointer !important;
      }

      /* Smooth, eye-pleasing Cyber-Grid overlay */
      .futuristic body::after {
        content: " ";
        position: fixed;
        inset: 0;
        background-image: 
          linear-gradient(rgba(18, 16, 35, 0) 50%, rgba(0, 0, 0, 0.12) 50%),
          linear-gradient(90deg, rgba(var(--primary-rgb), 0.015) 0%, rgba(var(--primary-rgb), 0.005) 50%, rgba(var(--primary-rgb), 0.015) 100%);
        background-size: 100% 4px, 100% 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.25;
      }

      /* Sci-fi scanning line animation */
      .futuristic-scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: linear-gradient(to bottom, transparent, rgba(var(--primary-rgb), 0.25), transparent);
        pointer-events: none;
        z-index: 10000;
        opacity: 0.4;
        animation: cyber-scan 15s linear infinite;
      }

      @keyframes cyber-scan {
        0% { transform: translateY(-50px); }
        100% { transform: translateY(105vh); }
      }

      /* SPECIFIC TEXT MAPPINGS: Webkit font override to match tech dashboard appearance without breaking icon alignments */
      .futuristic,
      .futuristic body,
      .futuristic p,
      .futuristic span,
      .futuristic div,
      .futuristic input,
      .futuristic select,
      .futuristic textarea,
      .futuristic button,
      .futuristic label {
        font-family: "JetBrains Mono", "Fira Code", monospace, sans-serif !important;
      }

      /* Heading typography with tracking and text neon shadow */
      .futuristic h1, 
      .futuristic h2, 
      .futuristic h3, 
      .futuristic h4, 
      .futuristic .font-brand {
        font-family: 'Outfit', sans-serif !important;
        text-transform: uppercase !important;
        letter-spacing: 0.1em !important;
        font-weight: 800 !important;
        text-shadow: 0 0 12px rgba(var(--primary-rgb), 0.5), 0 0 2px rgba(var(--primary-rgb), 0.8) !important;
      }

      /* ==========================================
         DARK FUTURISTIC (Neon Cyber Dark)
         ========================================== */
      .dark.futuristic body,
      .dark.futuristic .bg-gray-50, 
      .dark.futuristic .dark\:bg-gray-950,
      .dark.futuristic .bg-gray-950 {
        background-color: #02040b !important;
        background-image: 
          radial-gradient(circle at 10% 20%, rgba(var(--primary-rgb), 0.08) 0%, transparent 45%),
          radial-gradient(circle at 90% 80%, rgba(var(--primary-rgb), 0.05) 0%, transparent 45%),
          linear-gradient(rgba(var(--primary-rgb), 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(var(--primary-rgb), 0.015) 1px, transparent 1px) !important;
        background-size: 100% 100%, 100% 100%, 25px 25px, 25px 25px !important;
      }

      .dark.futuristic .bg-white,
      .dark.futuristic .dark\:bg-gray-900,
      .dark.futuristic .bg-white\/95,
      .dark.futuristic .bg-white\/60,
      .dark.futuristic .dark\:bg-white\/5,
      .dark.futuristic .card-base,
      .dark.futuristic .bg-white\/50,
      .dark.futuristic .bg-white\/40,
      .dark.futuristic .dark-card,
      .dark.futuristic .light-card {
        background: rgba(4, 7, 18, 0.82) !important;
        border: 1px solid rgba(var(--primary-rgb), 0.4) !important;
        box-shadow: 
          0 10px 30px rgba(0, 0, 0, 0.6), 
          0 0 15px rgba(var(--primary-rgb), 0.15), 
          inset 0 0 12px rgba(var(--primary-rgb), 0.05) !important;
        backdrop-filter: blur(16px) !important;
        border-radius: 8px !important;
        color: #f1f5f9 !important;
        position: relative;
        overflow: visible !important;
        transition: border-color 0.3s ease, box-shadow 0.3s ease !important;
      }

      /* Active inputs - Dark Mode */
      .dark.futuristic select,
      .dark.futuristic input,
      .dark.futuristic textarea,
      .dark.futuristic .input-base {
        background-color: rgba(2, 4, 12, 0.9) !important;
        border: 1px solid rgba(var(--primary-rgb), 0.5) !important;
        color: #f8fafc !important;
        border-radius: 6px !important;
        box-shadow: 0 0 8px rgba(var(--primary-rgb), 0.1) !important;
      }

      .dark.futuristic input:focus,
      .dark.futuristic select:focus,
      .dark.futuristic textarea:focus {
        border-color: rgba(var(--primary-rgb), 0.95) !important;
        box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.4), inset 0 0 8px rgba(var(--primary-rgb), 0.1) !important;
      }

      /* Dark Sidebar HUD & Headers */
      .dark.futuristic .w-64,
      .dark.futuristic md\:translate-x-0 {
        background: rgba(2, 4, 12, 0.96) !important;
        border-right: 2px solid rgba(var(--primary-rgb), 0.55) !important;
        box-shadow: 5px 0 25px rgba(var(--primary-rgb), 0.12) !important;
      }

      .dark.futuristic main div.md\:flex,
      .dark.futuristic main header,
      .dark.futuristic .sticky {
        background: rgba(2, 4, 12, 0.94) !important;
        border-bottom: 2px solid rgba(var(--primary-rgb), 0.55) !important;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45) !important;
      }

      /* Select option text for dark dropdowns */
      .dark.futuristic select option {
        background-color: #050814 !important;
        color: #f8fafc !important;
      }


      /* ==========================================
         LIGHT FUTURISTIC (Ice Cyber Light)
         ========================================== */
      html:not(.dark).futuristic body,
      html:not(.dark).futuristic .bg-gray-50, 
      html:not(.dark).futuristic .dark\:bg-gray-950,
      html:not(.dark).futuristic .bg-gray-950 {
        background-color: #f4f6fc !important;
        background-image: 
          radial-gradient(circle at 10% 20%, rgba(var(--primary-rgb), 0.08) 0%, transparent 45%),
          radial-gradient(circle at 90% 80%, rgba(var(--primary-rgb), 0.04) 0%, transparent 45%),
          linear-gradient(rgba(var(--primary-rgb), 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(var(--primary-rgb), 0.015) 1px, transparent 1px) !important;
        background-size: 100% 100%, 100% 100%, 25px 25px, 25px 25px !important;
      }

      html:not(.dark).futuristic .bg-white,
      html:not(.dark).futuristic .dark\:bg-gray-900,
      html:not(.dark).futuristic .bg-white\/95,
      html:not(.dark).futuristic .bg-white\/60,
      html:not(.dark).futuristic .dark\:bg-white\/5,
      html:not(.dark).futuristic .card-base,
      html:not(.dark).futuristic .bg-white\/50,
      html:not(.dark).futuristic .bg-white\/40,
      html:not(.dark).futuristic .dark-card,
      html:not(.dark).futuristic .light-card {
        background: rgba(255, 255, 255, 0.8) !important;
        border: 1px solid rgba(var(--primary-rgb), 0.35) !important;
        box-shadow: 
          0 10px 25px rgba(var(--primary-rgb), 0.06), 
          0 0 10px rgba(var(--primary-rgb), 0.08), 
          inset 0 0 10px rgba(255, 255, 255, 0.5) !important;
        backdrop-filter: blur(16px) !important;
        border-radius: 8px !important;
        color: #1e293b !important;
        position: relative;
        overflow: visible !important;
        transition: border-color 0.3s ease, box-shadow 0.3s ease !important;
      }

      /* Active inputs - Light Mode */
      html:not(.dark).futuristic select,
      html:not(.dark).futuristic input,
      html:not(.dark).futuristic textarea,
      html:not(.dark).futuristic .input-base {
        background-color: rgba(255, 255, 255, 0.95) !important;
        border: 1px solid rgba(var(--primary-rgb), 0.35) !important;
        color: #0f172a !important;
        border-radius: 6px !important;
        box-shadow: 0 0 8px rgba(var(--primary-rgb), 0.05) !important;
      }

      html:not(.dark).futuristic input:focus,
      html:not(.dark).futuristic select:focus,
      html:not(.dark).futuristic textarea:focus {
        border-color: rgba(var(--primary-rgb), 0.85) !important;
        box-shadow: 0 0 12px rgba(var(--primary-rgb), 0.25), inset 0 0 6px rgba(var(--primary-rgb), 0.05) !important;
      }

      /* Light Sidebar HUD & Headers */
      html:not(.dark).futuristic .w-64,
      html:not(.dark).futuristic md\:translate-x-0 {
        background: rgba(255, 255, 255, 0.92) !important;
        border-right: 2px solid rgba(var(--primary-rgb), 0.4) !important;
        box-shadow: 5px 0 20px rgba(var(--primary-rgb), 0.05) !important;
      }

      html:not(.dark).futuristic main div.md\:flex,
      html:not(.dark).futuristic main header,
      html:not(.dark).futuristic .sticky {
        background: rgba(255, 255, 255, 0.94) !important;
        border-bottom: 2px solid rgba(var(--primary-rgb), 0.4) !important;
        box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.04) !important;
      }

      /* Select option text for light dropdowns */
      html:not(.dark).futuristic select option {
        background-color: #ffffff !important;
        color: #0f172a !important;
      }


      /* ==========================================
         GENERIC FUTURISTIC PARADIGM ASSETS & BUTTONS
         ========================================== */
      /* Laser Accent Top Bar on Core Panels */
      .futuristic .bg-white::before,
      .futuristic .dark\:bg-gray-900::before,
      .futuristic .card-base::before {
        content: "";
        position: absolute;
        top: 0;
        left: 20px;
        right: 20px;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(var(--primary-rgb), 0.85), transparent);
        box-shadow: 0 0 8px rgba(var(--primary-rgb), 0.6);
        pointer-events: none;
        z-index: 10;
      }

      /* Sidebar Navigation Links Style override */
      .futuristic nav button {
        border-radius: 0px !important;
        border-left: 3px solid transparent !important;
        text-transform: uppercase !important;
        letter-spacing: 0.08em !important;
        font-size: 0.75rem !important;
        margin-bottom: 2px !important;
        transition: all 0.2s ease !important;
      }

      .futuristic nav button[style*="background-color"] {
        border-left: 3px solid rgba(var(--primary-rgb), 1) !important;
        background: linear-gradient(90deg, rgba(var(--primary-rgb), 0.16) 0%, transparent 100%) !important;
        text-shadow: 0 0 8px rgba(var(--primary-rgb), 0.4) !important;
        box-shadow: inset 2px 0 8px rgba(var(--primary-rgb), 0.08) !important;
      }

      /* Fully dynamic neon buttons matching current theme colour */
      .futuristic button[style*="background-color"],
      .futuristic .btn-primary,
      .futuristic button.bg-indigo-600,
      .futuristic button.bg-indigo-500 {
        background: linear-gradient(135deg, rgba(var(--primary-rgb), 1) 0%, rgba(var(--primary-rgb), 0.75) 100%) !important;
        border: 1px solid rgba(255, 255, 255, 0.25) !important;
        box-shadow: 
          0 4px 15px rgba(var(--primary-rgb), 0.35), 
          inset 0 1.5px 3px rgba(255, 255, 255, 0.2) !important;
        color: #ffffff !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.08em !important;
        text-shadow: 0 1px 2px rgba(0,0,0,0.2) !important;
        border-radius: 6px !important;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1) !important;
      }

      .futuristic button[style*="background-color"]:hover,
      .futuristic .btn-primary:hover,
      .futuristic button.bg-indigo-600:hover,
      .futuristic button.bg-indigo-500:hover {
        transform: translateY(-1px);
        box-shadow: 
          0 6px 20px rgba(var(--primary-rgb), 0.5), 
          inset 0 1.5px 4px rgba(255, 255, 255, 0.3) !important;
        filter: brightness(1.08);
      }

      /* Secondary dynamic outline buttons in futuristic view */
      .futuristic button:not([style*="background-color"]):not([class*="p-1"]):not([class*="text-gray"]):not([class*="text-red"]):not([class*="text-amber"]):not([class*="text-emerald"]):not([class*="bg-transparent"]):not([class*="rounded-full"]) {
        border: 1px solid rgba(var(--primary-rgb), 0.55) !important;
        background: rgba(var(--primary-rgb), 0.06) !important;
        color: rgba(var(--primary-rgb), 1) !important;
        text-shadow: 0 0 4px rgba(var(--primary-rgb), 0.15) !important;
        box-shadow: inset 0 0 6px rgba(var(--primary-rgb), 0.03) !important;
        border-radius: 6px !important;
        transition: all 0.2s ease !important;
      }

      .futuristic button:not([style*="background-color"]):not([class*="p-1"]):not([class*="text-gray"]):not([class*="text-red"]):not([class*="text-amber"]):not([class*="text-emerald"]):not([class*="bg-transparent"]):not([class*="rounded-full"]):hover {
        background: rgba(var(--primary-rgb), 0.14) !important;
        border-color: rgba(var(--primary-rgb), 0.85) !important;
        color: rgba(var(--primary-rgb), 1) !important;
        box-shadow: 
          0 0 12px rgba(var(--primary-rgb), 0.25), 
          inset 0 0 8px rgba(var(--primary-rgb), 0.06) !important;
      }

      .dark.futuristic button:not([style*="background-color"]):not([class*="p-1"]):not([class*="text-gray"]):not([class*="text-red"]):not([class*="text-amber"]):not([class*="text-emerald"]):not([class*="bg-transparent"]):not([class*="rounded-full"]) {
        color: #f1f5f9 !important;
        text-shadow: 0 0 6px rgba(var(--primary-rgb), 0.3) !important;
      }

      /* Interactive Muscle Anatomy Highlights & Outlines */
      .futuristic svg path {
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1) !important;
        stroke-width: 1.5 !important;
      }

      .futuristic svg path[fill*="none"] {
        stroke: rgba(var(--primary-rgb), 0.45) !important;
      }

      .futuristic svg path:hover {
        filter: drop-shadow(0 0 14px rgba(var(--primary-rgb), 1)) !important;
        fill: rgba(var(--primary-rgb), 0.4) !important;
        stroke: #ffffff !important;
        cursor: crosshair;
      }

      .futuristic svg path[style*="fill"] {
        stroke: rgba(var(--primary-rgb), 0.95) !important;
      }


      /* ==========================================
         STEAMPUNK DIESELPUNK PARADIGM (Immersive Steam Epoch)
         ========================================== */
      .steampunk,
      .steampunk body,
      .steampunk p,
      .steampunk span,
      .steampunk div,
      .steampunk input,
      .steampunk select,
      .steampunk textarea,
      .steampunk button,
      .steampunk label {
        font-family: 'Special Elite', 'Georgia', 'Courier New', Courier, serif !important;
        letter-spacing: 0.01em !important;
      }

      .steampunk h1, 
      .steampunk h2, 
      .steampunk h3, 
      .steampunk h4, 
      .steampunk .font-brand {
        font-family: 'Playfair Display', 'Times New Roman', Georgia, serif !important;
        font-weight: 800 !important;
        letter-spacing: 0.06em !important;
        text-transform: uppercase !important;
        text-shadow: 0.5px 0.5px 0px rgba(140, 98, 57, 0.4) !important;
      }

      /* DAYTIME LIGHT MODE: Vintage Archive conservatory, sunlit warm aged paper, brass schematic drawings */
      html:not(.dark).steampunk body,
      html:not(.dark).steampunk .bg-gray-50, 
      html:not(.dark).steampunk .dark\:bg-gray-950,
      html:not(.dark).steampunk .bg-gray-950 {
        background-color: #f7f3e8 !important;
        background-image: 
          radial-gradient(circle at 85% 15%, rgba(212, 175, 55, 0.08) 0%, transparent 45%),
          linear-gradient(rgba(140, 98, 57, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(140, 98, 57, 0.02) 1px, transparent 1px) !important;
        background-size: 100% 100%, 28px 28px, 28px 28px !important;
        position: relative;
      }

      /* Daylight sunbeams shimmering through warehouse roof vents */
      html:not(.dark).steampunk::before {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(125deg, rgba(245, 158, 11, 0.03) 0%, transparent 50%, rgba(140, 98, 57, 0.01) 100%);
        pointer-events: none;
        z-index: 1;
        mix-blend-mode: multiply;
        animation: steampunk-ray-sweep 12s ease-in-out infinite;
      }

      /* Moving blueprint grid lines for light mode */
      html:not(.dark).steampunk::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background-image: 
          radial-gradient(circle at 10% 40%, rgba(140, 98, 57, 0.05) 1px, transparent 1.5px),
          radial-gradient(circle at 80% 80%, rgba(140, 98, 57, 0.04) 1px, transparent 1.5px);
        background-size: 100px 100px;
        animation: steampunk-dust-drift 24s linear infinite;
        opacity: 0.8;
      }

      /* COZY NIGHTTIME DARK MODE: Glowing copper foundry, carbonized iron walls, burning coal fireplace, soot embers */
      .dark.steampunk body,
      .dark.steampunk .bg-gray-50, 
      .dark.steampunk .dark\:bg-gray-950,
      .dark.steampunk .bg-gray-950 {
        background-color: #0b0806 !important;
        background-image: 
          radial-gradient(circle at 50% 115%, rgba(245, 71, 11, 0.12) 0%, rgba(14, 11, 8, 0.02) 70%),
          radial-gradient(circle at 10% 20%, rgba(140, 98, 57, 0.06) 0%, transparent 40%),
          linear-gradient(rgba(140, 98, 57, 0.03) 1px, transparent 1px),

      /* Burning coal fire glow fluctuations overlay */
      .dark.steampunk::before {
        content: "";

        mix-blend-mode: screen;

      /* STEAM-MACHINERY BUTTONS (Etched lever style, physical solid press) */
      .steampunk button[style*="background-color"],

      .steampunk .btn-primary:hover,
      .steampunk button.bg-indigo-600:hover,

      .dark.steampunk button:not([style*="background-color"]):not([class*="p-1"]):not([class*="text-gray"]):not([class*="text-red"]):not([class*="text-amber"]):not([class*="text-emerald"]):not([class*="bg-transparent"]):not([class*="rounded-full"]) {

      /* ====================================================

      /* ==========================================
         SOLARPUNK VIBE (Botanical Eco-Futurism)
         ========================================== */
      .solarpunk,
      .solarpunk body,
      .solarpunk p,
      .solarpunk span,
      .solarpunk div,
      .solarpunk input,
      .solarpunk select,
      .solarpunk textarea,

      .solarpunk h2, 
      .solarpunk h3, 
      .solarpunk h4,

        font-family: 'Fraunces', 'Playfair Display', serif !important;
        font-weight: 800 !important;
        letter-spacing: -0.01em !important;
      }

      /* DAYTIME LIGHT MODE FEEL: Sun-drenched, radiant sky, rich linen cremes, comforting leaf greens */

      html:not(.dark).solarpunk .bg-gray-50,

      html:not(.dark).solarpunk .bg-gray-950 {

          radial-gradient(circle at 50% 120%, rgba(209, 250, 229, 0.12) 0%, transparent 60%) !important;
        background-size: 100% 100% !important;
        position: relative;
      }

      /* DAYTIME Sunbeam/Solar glow effect overlay */
      html:not(.dark).solarpunk::before {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, rgba(251, 191, 36, 0.02) 0%, transparent 50%, rgba(16, 185, 129, 0.01) 100%);
        pointer-events: none;
        z-index: 1;
        mix-blend-mode: color-dodge;
        animation: solarpunk-sunray-pulse 10s ease-in-out infinite;

      /* LIVING Spore particles floating in daylight */
      html:not(.dark).solarpunk::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background-image: 
          radial-gradient(circle at 20% 30%, rgba(251, 191, 36, 0.18) 1.5px, transparent 3px),
          radial-gradient(circle at 75% 45%, rgba(52, 211, 153, 0.15) 1.5px, transparent 3px),
          radial-gradient(circle at 45% 80%, rgba(251, 191, 36, 0.14) 2px, transparent 4px),
          radial-gradient(circle at 85% 75%, rgba(52, 211, 153, 0.18) 2px, transparent 4px);
        background-size: 140px 140px;
        animation: solarpunk-warm-wind 24s linear infinite;
        opacity: 0.65;
      }

      /* COZY NIGHT TIME FEEL: Deep twilight evergreen forest canopy, soothing biolumes, tranquil starry sky */
      .dark.solarpunk body,
      .dark.solarpunk .bg-gray-50, 
      .dark.solarpunk .dark\:bg-gray-950,
      .dark.solarpunk .bg-gray-950 {
        background-color: #060e0a !important;
        background-image: 
          radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.08) 0%, transparent 45%),
          radial-gradient(circle at 15% 85%, rgba(217, 119, 6, 0.04) 0%, transparent 40%),
          radial-gradient(circle at 50% 50%, rgba(6, 78, 59, 0.1) 0%, transparent 60%) !important;
        background-size: 100% 100% !important;
      }

      /* NIGHTTIME Twilight aura overlay */
      .dark.solarpunk::before {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(to bottom, rgba(6, 14, 10, 0) 60%, rgba(16, 185, 129, 0.02) 100%);
        pointer-events: none;
        z-index: 1;
      }

      /* LIVING Bioluminescent fireflies & spores floating in cozy night */
      .dark.solarpunk::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background-image: 
          radial-gradient(circle at 35% 25%, rgba(52, 211, 153, 0.25) 1.5px, transparent 3.5px),
          radial-gradient(circle at 80% 65%, rgba(251, 191, 36, 0.22) 1.5px, transparent 3.5px),
          radial-gradient(circle at 15% 55%, rgba(52, 211, 153, 0.2) 2px, transparent 4px),

        background-size: 180px 180px;
        animation: solarpunk-mystical-drift 28s linear infinite;
        opacity: 0.7;
      }

      /* Animated solar rays and cozy night elements */
      @keyframes solarpunk-sunray-pulse {
        0%, 100% {
          opacity: 0.25;
